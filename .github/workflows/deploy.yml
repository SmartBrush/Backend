name: Deploy to EC2

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build JAR with prod profile
        run: ./gradlew build -x test -Dspring.profiles.active=prod

      - name: Write PEM file from secret
        run: |
          echo "${{ secrets.EC2_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Upload jar to EC2
        run: |
          scp -i private_key.pem -o StrictHostKeyChecking=no \
            ./build/libs/*.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/app/

      - name: Restart app on EC2
        run: |
          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
              pkill -f 'java -jar' || true
              nohup java -jar /home/${{ secrets.EC2_USER }}/app/*.jar \
              --spring.profiles.active=prod \
              > /home/${{ secrets.EC2_USER }}/app/log.txt 2>&1 &
          EOF
