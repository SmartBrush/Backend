name: Deploy to EC2

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소 checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. application.yml 세팅
      - name: Set application.yml
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_YML }}" > src/main/resources/application.yml

      # 4. gradlew 권한 부여
      - name: Grant execute permission
        run: chmod +x gradlew

      # 5. Gradle 빌드
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 6. JAR EC2로 업로드 (plain 제외)
      - name: Upload JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: $(ls build/libs/*.jar | grep -v plain)
          target: /home/ubuntu/app

      # 7. EC2에서 JAR 실행
      - name: SSH and restart app
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            pkill -f 'java -jar' || true
            JAR_NAME=$(ls /home/ubuntu/app/*.jar | grep -v plain | head -n 1)
            nohup java -jar $JAR_NAME > /home/ubuntu/app/log.txt 2>&1 &
